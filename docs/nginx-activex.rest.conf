# Example nginx site for FleetHub (activex.rest).
#
# Env (apps/web/.env.local) on the same machine as nginx:
#   NEXT_PUBLIC_APP_URL=https://activex.rest          ← browser origin
#   NEXT_PUBLIC_SERVER_URL=http://127.0.0.1:4000      ← internal @fleethub/server (NOT https://api.activex.rest)
# If SERVER_URL points at the public api.* host, Next rewrites loop nginx → Next → nginx → 431.
#
# If you see: "400 Request Header Or Cookie Too Large" or "431 Request Header Fields Too Large"
# → Raise nginx buffers (below) AND fix SERVER_URL as above; clear cookies for activex.rest.
#
# Copy to e.g. `/etc/nginx/sites-available/activex.rest` and symlink sites-enabled,
# then: `sudo nginx -t && sudo systemctl reload nginx`

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream fleethub_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream fleethub_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name activex.rest api.activex.rest admin.activex.rest;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name activex.rest;

    ssl_certificate     /etc/letsencrypt/live/activex.rest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activex.rest/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Large cookies / headers (session JWT, many cookies, long Cookie header) ---
    client_header_buffer_size 16k;
    large_client_header_buffers 4 128k;

    # Uber/FreeNow webhooks → Fastify directly (raw body, no Next rewrite)
    location /api/webhooks/ {
        proxy_pass http://fleethub_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    location / {
        proxy_pass http://fleethub_web;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.activex.rest;

    ssl_certificate     /etc/letsencrypt/live/activex.rest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activex.rest/privkey.pem;

    client_header_buffer_size 16k;
    large_client_header_buffers 4 128k;

    location /api/webhooks/ {
        proxy_pass http://fleethub_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    location / {
        proxy_pass http://fleethub_web;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.activex.rest;

    ssl_certificate     /etc/letsencrypt/live/activex.rest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activex.rest/privkey.pem;

    client_header_buffer_size 16k;
    large_client_header_buffers 4 128k;

    location / {
        proxy_pass http://fleethub_web;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

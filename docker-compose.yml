services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleethub
      POSTGRES_PASSWORD: fleethub
      POSTGRES_DB: fleethub
    ports:
      - "5432:5432"
    volumes:
      - fleethub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleethub -d fleethub"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  fleethub_pg:
